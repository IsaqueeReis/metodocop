
<!DOCTYPE html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Método COP</title>
    <!-- Project Logo Favicon -->
    <link rel="icon" href="/METODO COP LOGO.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: {
                DEFAULT: '#DC2626', // Red 600
                dark: '#7F1D1D', // Red 900
              },
              secondary: '#FFFFFF', // White for accents instead of yellow
              dark: {
                950: '#09090b', // Zinc 950 (Blacker)
                900: '#18181b', // Zinc 900
                800: '#27272a', // Zinc 800
                700: '#3f3f46', // Zinc 700
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Montserrat', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap');
      html { font-size: 14px; } /* Menos zoom global (Responsive scale down) */
      body {
        font-family: 'Inter', sans-serif;
        background-color: #050505; /* Blackest base */
        color: #f8fafc;
      }
      h1, h2, h3, h4, h5, h6, .font-heading {
        font-family: 'Montserrat', sans-serif;
        font-weight: 800; /* Extra Bold */
      }

      /* Classes Táticas Globais */
      .glass-panel {
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      }
      .glitch-text {
        text-shadow: 2px 0 red, -2px 0 blue;
        animation: glitch 1s linear infinite;
      }
      @keyframes glitch {
        2%, 64% { transform: translate(2px,0) skew(0deg); }
        4%, 60% { transform: translate(-2px,0) skew(0deg); }
        62% { transform: translate(0,0) skew(5deg); }
      }

      /* ====== LOADING SCREEN: Logo Glitch ====== */
      .loading-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(5, 5, 5, 0.85);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }

      .glitch-logo-wrapper {
        position: relative;
        width: 220px;
        height: 220px;
      }

      .glitch-logo-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .glitch-logo-wrapper .glitch-layer {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        pointer-events: none;
      }

      .glitch-logo-wrapper .glitch-layer.red {
        mix-blend-mode: screen;
        opacity: 0;
        animation: glitchLayerRed 3s ease-in-out infinite;
      }
      .glitch-logo-wrapper .glitch-layer.blue {
        mix-blend-mode: screen;
        opacity: 0;
        animation: glitchLayerBlue 3s ease-in-out infinite 0.15s;
      }

      @keyframes glitchLayerRed {
        0%, 100% { opacity: 0; transform: translate(0,0); filter: none; }
        7%  { opacity: 0.7; transform: translate(4px, -2px); filter: hue-rotate(-30deg) saturate(3) brightness(1.5); }
        10% { opacity: 0; transform: translate(0,0); }
        42% { opacity: 0; }
        43% { opacity: 0.5; transform: translate(-3px, 1px) skewX(2deg); filter: hue-rotate(-30deg) saturate(3) brightness(1.5); }
        46% { opacity: 0; transform: translate(0,0); }
        77% { opacity: 0; }
        78% { opacity: 0.6; transform: translate(5px, -1px) skewX(-1deg); filter: hue-rotate(-30deg) saturate(3) brightness(1.5); }
        82% { opacity: 0; transform: translate(0,0); }
      }

      @keyframes glitchLayerBlue {
        0%, 100% { opacity: 0; transform: translate(0,0); filter: none; }
        7%  { opacity: 0.7; transform: translate(-4px, 2px); filter: hue-rotate(190deg) saturate(3) brightness(1.5); }
        10% { opacity: 0; transform: translate(0,0); }
        42% { opacity: 0; }
        43% { opacity: 0.5; transform: translate(3px, -1px) skewX(-2deg); filter: hue-rotate(190deg) saturate(3) brightness(1.5); }
        46% { opacity: 0; transform: translate(0,0); }
        77% { opacity: 0; }
        78% { opacity: 0.6; transform: translate(-5px, 1px) skewX(1deg); filter: hue-rotate(190deg) saturate(3) brightness(1.5); }
        82% { opacity: 0; transform: translate(0,0); }
      }

      @keyframes glitchMainLogo {
        0%, 100% { transform: translate(0,0) scale(1); }
        7%  { transform: translate(2px, -1px) scale(1.01); }
        8%  { transform: translate(-1px, 1px) scale(0.99); }
        9%  { transform: translate(0,0) scale(1); }
        43% { transform: translate(-2px, 0) skewX(0.5deg); }
        45% { transform: translate(0,0) skewX(0deg); }
        78% { transform: translate(1px, -1px) scale(1.005); }
        80% { transform: translate(0,0) scale(1); }
      }

      .glitch-logo-wrapper .main-logo {
        animation: glitchMainLogo 3s ease-in-out infinite;
        filter: drop-shadow(0 0 20px rgba(220, 38, 38, 0.3));
      }

      /* scan line overlay */
      .glitch-logo-wrapper::after {
        content: '';
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0,0,0,0.08) 2px,
          rgba(0,0,0,0.08) 4px
        );
        pointer-events: none;
        border-radius: 8px;
      }

      .loading-pulse-text {
        animation: loadPulse 2s ease-in-out infinite;
      }
      @keyframes loadPulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }

      /* Custom Scrollbar for minimalistic UI */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #3f3f46; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #52525b; 
      }
      
      /* Sidebar specific scrollbar: invisible until hovered */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar:hover::-webkit-scrollbar-thumb {
        background: #3f3f46;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #52525b;
      }
    </style>
  <script type="importmap">
{
  "imports": {

  }
}
</script>

</head>
